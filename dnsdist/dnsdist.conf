function enableEmergencyCache()
  setStaleCacheEntriesTTL(longCacheMaxTTL)
  infolog("[dnsdist-runtime] stale cache serving enabled, ttl=" .. longCacheMaxTTL)
end

function disableEmergencyCache()
  setStaleCacheEntriesTTL(0)
  infolog("[dnsdist-runtime] stale cache serving disabled")
end

function showEmergencyCacheStatus()
  print("boot stale mode: " .. tostring(staleCacheEnabled))
  print("cache retention ttl: " .. tostring(longCacheMaxTTL))
  print("runtime stale mode can be changed with enableEmergencyCache() / disableEmergencyCache()")
end

local iranDomainsFile = "/etc/dnsdist/ir-domains.txt"
local freeDomainsFile = "/etc/dnsdist/free-domains.txt"
local localHostsFile = "/etc/dnsdist/hosts.override"

local iranDomains = {}
local freeSuffixes = {}
local freeKeywords = {}
local localHosts = {}

local blockedIPv4Prefix = string.char(10, 10, 34)
local localHostsTTL = 60

local function trim(value)
  return value:match("^%s*(.-)%s*$")
end

local function normalizeName(value)
  local lowered = value:lower()
  return lowered:gsub("%.$", "")
end

local function splitFields(value)
  local fields = {}
  for field in value:gmatch("%S+") do
    table.insert(fields, field)
  end
  return fields
end

local function ensureLocalHostEntry(name)
  if localHosts[name] == nil then
    localHosts[name] = {
      A = {},
      AAAA = {}
    }
  end

  return localHosts[name]
end

local function appendUniqueAddress(target, address)
  for _, existing in ipairs(target) do
    if tostring(existing) == tostring(address) then
      return
    end
  end

  table.insert(target, address)
end

local function loadDomainList(path, targetSet)
  local handle = io.open(path, "r")
  if handle == nil then
    warnlog("[dnsdist-startup] could not open " .. path)
    return 0
  end

  local count = 0
  for line in handle:lines() do
    local entry = trim(line)
    if entry ~= "" and entry:sub(1, 1) ~= "#" then
      targetSet[normalizeName(entry)] = true
      count = count + 1
    end
  end

  handle:close()
  return count
end

local function loadFreeList(path)
  local handle = io.open(path, "r")
  if handle == nil then
    warnlog("[dnsdist-startup] could not open " .. path)
    return 0, 0
  end

  local suffixCount = 0
  local keywordCount = 0

  for line in handle:lines() do
    local entry = trim(line)
    if entry ~= "" and entry:sub(1, 1) ~= "#" then
      local normalized = normalizeName(entry)
      if normalized:find(".", 1, true) ~= nil then
        freeSuffixes[normalized] = true
        suffixCount = suffixCount + 1
      else
        table.insert(freeKeywords, normalized)
        keywordCount = keywordCount + 1
      end
    end
  end

  handle:close()
  return suffixCount, keywordCount
end

local function loadLocalHosts(path)
  local handle = io.open(path, "r")
  if handle == nil then
    warnlog("[dnsdist-startup] could not open " .. path)
    return 0
  end

  local count = 0

  for line in handle:lines() do
    local withoutComment = line:gsub("%s+#.*$", "")
    local entry = trim(withoutComment)
    if entry ~= "" and entry:sub(1, 1) ~= "#" then
      local fields = splitFields(entry)
      local ip = fields[1]
      if ip ~= nil and #fields > 1 then
        local recordType = nil
        if ip:find(":", 1, true) ~= nil then
          recordType = "AAAA"
        elseif ip:match("^%d+%.%d+%.%d+%.%d+$") ~= nil then
          recordType = "A"
        end

        if recordType ~= nil then
          local address = newCA(ip)
          for idx = 2, #fields do
            local name = normalizeName(fields[idx])
            local hostEntry = ensureLocalHostEntry(name)
            appendUniqueAddress(hostEntry[recordType], address)
            count = count + 1
          end
        end
      end
    end
  end

  handle:close()
  return count
end

local loadedIranDomains = loadDomainList(iranDomainsFile, iranDomains)
local loadedFreeSuffixes, loadedFreeKeywords = loadFreeList(freeDomainsFile)
local loadedLocalHosts = loadLocalHosts(localHostsFile)

infolog("[dnsdist-startup] loaded iran domains: " .. loadedIranDomains)
infolog("[dnsdist-startup] loaded free suffixes: " .. loadedFreeSuffixes .. ", free keywords: " .. loadedFreeKeywords)
infolog("[dnsdist-startup] loaded local hosts records: " .. loadedLocalHosts)

local function matchesSuffixSet(name, suffixSet)
  local candidate = name
  while true do
    if suffixSet[candidate] then
      return true, candidate
    end

    local dot = candidate:find(".", 1, true)
    if dot == nil then
      return false, nil
    end
    candidate = candidate:sub(dot + 1)
  end
end

local function isIRDomain(name)
  return name == "ir" or name:sub(-3) == ".ir"
end

local function isFreeDomain(name)
  local suffixMatch, matchedSuffix = matchesSuffixSet(name, freeSuffixes)
  if suffixMatch then
    return true, "free-suffix:" .. matchedSuffix
  end

  for _, keyword in ipairs(freeKeywords) do
    if name:find(keyword, 1, true) ~= nil then
      return true, "free-keyword:" .. keyword
    end
  end

  return false, nil
end

local function iranPoolHasUpServer()
  local servers = getPoolServers("iran")
  for _, server in ipairs(servers) do
    if server:isUp() then
      return true
    end
  end
  return false
end

local function firstUpServerName(poolName)
  local servers = getPoolServers(poolName)
  for _, server in ipairs(servers) do
    if server:isUp() then
      return server:getName()
    end
  end
  return "none-up"
end

local function hasBlockedARecord(dr)
  local packet = dr:getContent()
  local overlay = newDNSPacketOverlay(packet)
  local answerCount = overlay:getRecordsCountInSection(DNSSection.Answer)

  for idx = 0, answerCount - 1 do
    local rec = overlay:getRecord(idx)
    if rec.type == DNSQType.A and rec.contentLength == 4 then
      local start = rec.contentOffset + 1 -- Lua strings are 1-based
      if packet:sub(start, start + 2) == blockedIPv4Prefix then
        local lastOctet = packet:byte(start + 3)
        if lastOctet ~= nil and lastOctet <= 254 then
          return true
        end
      end
    end
  end

  return false
end

local function getSelectedBackendName(dr)
  local ok, backend = pcall(function() return dr:getSelectedBackend() end)
  if not ok or backend == nil then
    return "unknown"
  end

  local okName, backendName = pcall(function() return backend:getName() end)
  if not okName or backendName == nil or backendName == "" then
    return "unknown"
  end

  return backendName
end

local function answerFromLocalHosts(dq)
  local qname = normalizeName(dq.qname:toString())
  local hostEntry = localHosts[qname]

  if hostEntry == nil then
    return DNSAction.None
  end

  if dq.qtype == DNSQType.A and #hostEntry.A > 0 then
    dq:spoof(hostEntry.A)
    dq:setTag("route-initial", "local-hosts")
    dq:setTag("route-reason", "local-hosts:A")
    infolog("[dnsdist-local-hosts] qname=" .. qname .. " qtype=A answers=" .. #hostEntry.A)
    return DNSAction.HeaderModify
  end

  if dq.qtype == DNSQType.AAAA and #hostEntry.AAAA > 0 then
    dq:spoof(hostEntry.AAAA)
    dq:setTag("route-initial", "local-hosts")
    dq:setTag("route-reason", "local-hosts:AAAA")
    infolog("[dnsdist-local-hosts] qname=" .. qname .. " qtype=AAAA answers=" .. #hostEntry.AAAA)
    return DNSAction.HeaderModify
  end

  if dq.qtype == DNSQType.ANY then
    if #hostEntry.A > 0 then
      dq:spoof(hostEntry.A)
      dq:setTag("route-initial", "local-hosts")
      dq:setTag("route-reason", "local-hosts:ANY->A")
      infolog("[dnsdist-local-hosts] qname=" .. qname .. " qtype=ANY answers=" .. #hostEntry.A .. " type=A")
      return DNSAction.HeaderModify
    end

    if #hostEntry.AAAA > 0 then
      dq:spoof(hostEntry.AAAA)
      dq:setTag("route-initial", "local-hosts")
      dq:setTag("route-reason", "local-hosts:ANY->AAAA")
      infolog("[dnsdist-local-hosts] qname=" .. qname .. " qtype=ANY answers=" .. #hostEntry.AAAA .. " type=AAAA")
      return DNSAction.HeaderModify
    end
  end

  dq:setNegativeAndAdditionalSOA(
    false,
    qname .. ".",
    localHostsTTL,
    "localhost.",
    "hostmaster.localhost.",
    1,
    localHostsTTL,
    localHostsTTL,
    localHostsTTL,
    localHostsTTL
  )
  dq:setTag("route-initial", "local-hosts")
  dq:setTag("route-reason", "local-hosts:nodata")
  infolog("[dnsdist-local-hosts] qname=" .. qname .. " qtype=" .. tostring(dq.qtype) .. " answers=0 nodata=true")
  return DNSAction.HeaderModify
end

function routeQuery(dq)
  dq:setRestartable()

  local qname = normalizeName(dq.qname:toString())
  local initialRoute = "free"
  local reason = "free-default"

  local freeMatch, freeReason = isFreeDomain(qname)
  if freeMatch then
    initialRoute = "free"
    reason = freeReason
    dq.pool = "" -- default pool contains dnscrypt ("free")
    dq:setTag("initial-upstream", "free")
  else
    local listedIran, matchedDomain = matchesSuffixSet(qname, iranDomains)
    local shouldUseIran = isIRDomain(qname) or listedIran

    if shouldUseIran and iranPoolHasUpServer() then
      dq.pool = "iran"
      dq:setTag("initial-upstream", firstUpServerName("iran"))
      initialRoute = "iran"
      if isIRDomain(qname) then
        reason = "iran-tld:.ir"
      else
        reason = "iran-domains-list:" .. matchedDomain
      end
    elseif shouldUseIran then
      initialRoute = "free"
      reason = "iran-pool-down"
      dq.pool = "" -- default pool contains dnscrypt ("free")
      dq:setTag("initial-upstream", "free")
    else
      dq.pool = "" -- default pool contains dnscrypt ("free")
      dq:setTag("initial-upstream", "free")
    end
  end

  dq:setTag("route-initial", initialRoute)
  dq:setTag("route-reason", reason)

  infolog(
    "[dnsdist-query-route] qname=" .. qname ..
    " initial=" .. initialRoute ..
    " reason=" .. reason ..
    " upstream=" .. dq:getTag("initial-upstream")
  )
  return DNSAction.None
end

function fallbackIranToFreeAndLog(dr)
  if dr:getTag("response-logged") == "1" then
    return DNSResponseAction.None
  end

  if dr.pool == "iran" and dr:getTag("fallback-to-free-done") ~= "1" and iranPoolHasUpServer() then
    local badRcode = dr.rcode ~= DNSRCode.NOERROR
    local badAnswer = hasBlockedARecord(dr)

    if badRcode or badAnswer then
      local fallbackFromUpstream = getSelectedBackendName(dr)
      local fallbackReason = "bad-rcode"
      if badAnswer and not badRcode then
        fallbackReason = "blocked-a-10.10.34.0/24"
      elseif badAnswer and badRcode then
        fallbackReason = "bad-rcode+blocked-a-10.10.34.0/24"
      end

      dr:setTag("fallback-to-free-done", "1")
      dr:setTag("fallback-reason", fallbackReason)
      dr:setTag("fallback-from-upstream", fallbackFromUpstream)
      dr.pool = ""
      dr:restart()
      return DNSResponseAction.None
    end
  end

  local qname = normalizeName(dr.qname:toString())
  local initialRoute = dr:getTag("route-initial")
  local routeReason = dr:getTag("route-reason")
  local fallbackUsed = dr:getTag("fallback-to-free-done") == "1" and "yes" or "no"
  local fallbackReason = dr:getTag("fallback-reason")
  local fallbackFromUpstream = dr:getTag("fallback-from-upstream")
  local finalRoute = dr.pool == "" and "free" or dr.pool
  local finalUpstream = getSelectedBackendName(dr)

  if initialRoute == nil or initialRoute == "" then
    initialRoute = "unknown"
  end
  if routeReason == nil or routeReason == "" then
    routeReason = "unknown"
  end
  if fallbackReason == nil or fallbackReason == "" then
    fallbackReason = "-"
  end
  if fallbackFromUpstream == nil or fallbackFromUpstream == "" then
    fallbackFromUpstream = "-"
  end

  infolog(
    "[dnsdist-response-route] qname=" .. qname ..
    " initial=" .. initialRoute ..
    " reason=" .. routeReason ..
    " final=" .. finalRoute ..
    " finalUpstream=" .. finalUpstream ..
    " fallback=" .. fallbackUsed ..
    " fallbackFromUpstream=" .. fallbackFromUpstream ..
    " fallbackReason=" .. fallbackReason ..
    " rcode=" .. tostring(dr.rcode)
  )

  dr:setTag("response-logged", "1")
  return DNSResponseAction.None
end

addAction(AllRule(), LuaAction(answerFromLocalHosts))
addAction(AllRule(), LuaAction(routeQuery))
addResponseAction(AllRule(), LuaResponseAction(fallbackIranToFreeAndLog))
