local function envFlag(name, defaultValue)
  local value = os.getenv(name)
  if value == nil or value == "" then
    return defaultValue
  end

  local normalized = value:lower()
  return normalized == "1" or normalized == "true" or normalized == "yes" or normalized == "on"
end

